kind = "web"
previewPath = "/salvageme-admin/"
title = "SalvageMe Admin"
version = "1.0.0"
id = "artifacts/salvageme-admin"
router = "path"

[[services]]
name = "web"
paths = [ "/salvageme-admin/" ]
localPort = 18506

[services.development]
run = "pnpm --filter @workspace/salvageme-admin run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/salvageme-admin", "run", "build" ]
serve = "static"
publicDir = "artifacts/salvageme-admin/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18506"
BASE_PATH = "/salvageme-admin/"
